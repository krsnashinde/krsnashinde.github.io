<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishna Shinde | Portfolio Hub</title>

<style>

/* EXISTING STYLES KEPT + NEW ADDED */

/* BODY */
body {
  margin:0;
  font-family:Poppins, sans-serif;
  background:black;
  color:white;
  scroll-behavior:smooth;
}

/* HEADER */
header {
  position:sticky;
  top:0;
  background:black;
  padding:10px;
  text-align:center;
}

/* HERO */
#hero {
  text-align:center;
  padding:50px;
}

.profile {
  width:200px;
  border-radius:50%;
}

/* BUTTON */
.resume-btn {
  padding:10px 20px;
  border:2px solid #00ff9f;
  color:#00ff9f;
  text-decoration:none;
  border-radius:20px;
}

/* NEW FEATURES */

/* DARK MODE */
.light {
  background:white;
  color:black;
}

/* TOGGLE */
#theme-toggle {
  position:fixed;
  top:10px;
  left:10px;
}

/* BACK TO TOP */
#backToTop {
  position:fixed;
  bottom:20px;
  right:20px;
  display:none;
}

/* SCROLL % */
#scroll-percent {
  position:fixed;
  bottom:80px;
  right:20px;
}

/* SKILLS */
.skill-bar {
  width:100%;
  background:#333;
}
.skill-fill {
  height:10px;
  background:#00ff9f;
  width:0;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
}
.stars {
  color:gold;
}

</style>
</head>

<body>

<button id="theme-toggle">🌙</button>
<button id="backToTop">⬆</button>
<div id="scroll-percent">0%</div>

<header>
<h1>My Portfolio Hub</h1>
</header>

<section id="hero">
<img src="Profile.jpg" class="profile">
<h2>Hello, I'm Krishna Shinde</h2>
<p class="typing">Full Stack Developer</p>

<a href="#" class="resume-btn">Resume</a>

<div>
<a href="#" class="resume-btn">GitHub</a>
<a href="#" class="resume-btn">LinkedIn</a>
</div>
</section>

<section id="about">
<h2>About</h2>
<p>I am a full stack developer.</p>
</section>

<section id="skills">
<h2>Skills</h2>

<div>
React
<div class="skill-bar">
<div class="skill-fill" data-width="90%"></div>
</div>
</div>

<div>
JavaScript
<div class="skill-bar">
<div class="skill-fill" data-width="85%"></div>
</div>
</div>

</section>

<section id="projects">
<h2>Projects</h2>

<button onclick="filterProjects('all')">All</button>
<button onclick="filterProjects('react')">React</button>

<div class="project react">
<h3>Portfolio</h3>
</div>

<div class="project">
<h3>Blog</h3>
</div>

</section>

<section id="contact">
<h2>Contact</h2>

<form>
<input type="text" placeholder="Name"><br>
<input type="email" placeholder="Email"><br>
<textarea placeholder="Message"></textarea><br>
<button>Send</button>
</form>

</section>

<footer>
<h3>Portfolio Rating</h3>
<div class="stars">⭐⭐⭐⭐☆</div>
<p>4.7 / 5</p>
</footer>

<script>

/* DARK MODE */
document.getElementById("theme-toggle").onclick = () => {
  document.body.classList.toggle("light");
};

/* BACK TO TOP */
window.onscroll = () => {
  document.getElementById("backToTop").style.display =
    window.scrollY > 200 ? "block" : "none";
};

document.getElementById("backToTop").onclick = () => {
  window.scrollTo({top:0,behavior:"smooth"});
};

/* SCROLL % */
window.addEventListener("scroll", () => {
  let h = document.documentElement.scrollHeight - window.innerHeight;
  let p = Math.round((window.scrollY / h) * 100);
  document.getElementById("scroll-percent").innerText = p + "%";
});

/* SKILL ANIMATION */
window.addEventListener("scroll", () => {
  document.querySelectorAll(".skill-fill").forEach(el => {
    if(el.getBoundingClientRect().top < window.innerHeight) {
      el.style.width = el.dataset.width;
    }
  });
});

/* FILTER */
function filterProjects(type) {
  document.querySelectorAll(".project").forEach(p => {
    p.style.display =
      type === "all" || p.classList.contains(type)
        ? "block"
        : "none";
  });
}

</script>

</body>
</html>
