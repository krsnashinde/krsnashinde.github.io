<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Krishna Shinde | Portfolio Hub</title>

<style>

/* ---------- INTRO SCREEN ---------- */
#intro-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  animation: fadeOut 2s ease 2.8s forwards;
}
#intro-screen h1 {
  font-size: 3rem;
  color: #00ff9f;
  font-family: 'Poppins', sans-serif;
  font-weight: 800;
  letter-spacing: 3px;
  animation: bounceIn 2s ease;
}
@keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
@keyframes bounceIn {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); }
}

/* ---------- BODY ---------- */
body {
  margin: 0;
  font-family: 'Poppins', 'Segoe UI', Tahoma, sans-serif;
  background: linear-gradient(270deg, #0f0f0f, #001f2f, #0f0f0f);
  background-size: 600% 600%;
  animation: gradientBG 20s ease infinite;
  color: #fff;
  overflow-x: hidden;
  scroll-behavior: smooth;
  cursor: none;
}
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ---------- PARTICLES ---------- */
#particles, #code-rain {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -2;
}

/* ---------- HEADER ---------- */
header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(0,0,0,0.95);
  padding: 1rem 0.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-bottom: 1px solid #555;
}

/* ---------- HERO ---------- */
#hero {
  text-align: center;
  padding: 6rem 1rem 4rem;
}

/* ---------- SECTION ---------- */
section {
  max-width: 900px;
  margin: auto;
  padding: 3rem 1.5rem;
}

/* ---------- RATING (NEW) ---------- */
#rating {
  text-align: center;
}

.rating-box {
  font-size: 2.5rem;
  margin-top: 1rem;
}

.star {
  cursor: pointer;
  color: #555;
  transition: 0.3s;
}

.star:hover,
.star.active {
  color: #00ff9f;
  text-shadow: 0 0 10px #00ff9f, 0 0 20px #ff6fff;
  transform: scale(1.2);
}

#rating-text {
  margin-top: 1rem;
  color: #ccc;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro-screen"><h1>CODE AND INNOVATE</h1></div>

<header>
<h1>My Portfolio Hub</h1>
</header>

<section id="hero">
<h2>Hello, I'm Krishna Shinde</h2>
<p>Full-Stack Developer 🚀</p>
</section>

<section id="about">
<h2>About Me</h2>
<p>I’m a passionate Full-Stack Developer...</p>
</section>

<section id="skills">
<h2>Skills</h2>
<ul>
<li>React</li>
<li>JavaScript</li>
<li>Node.js</li>
</ul>
</section>

<section id="projects">
<h2>Projects</h2>
<p>Portfolio Hub</p>
</section>

<section id="contact">
<h2>Contact Me</h2>
<form>
<input type="text" placeholder="Name"><br><br>
<input type="email" placeholder="Email"><br><br>
<textarea placeholder="Message"></textarea><br><br>
<button>Send</button>
</form>
</section>

<!-- ⭐ RATING SECTION -->
<section id="rating">
<h2>Do you like it? ⭐</h2>

<div class="rating-box">
<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>
</div>

<p id="rating-text">Click a star to rate</p>
</section>

<script>

// STAR RATING
const stars = document.querySelectorAll(".star");
const ratingText = document.getElementById("rating-text");

stars.forEach(star => {
  star.addEventListener("click", () => {
    let value = star.getAttribute("data-value");

    stars.forEach(s => s.classList.remove("active"));

    for (let i = 0; i < value; i++) {
      stars[i].classList.add("active");
    }

    ratingText.textContent = `You rated ${value} star${value > 1 ? 's' : ''} ⭐`;
  });
});

</script>

</body>
</html>
